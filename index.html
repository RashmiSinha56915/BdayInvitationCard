<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2nd Birthday Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .invitation-container {
            perspective: 1000px;
        }

        .birthday-card {
            width: 450px;
            height: 750px;
            background: linear-gradient(145deg, #fff5f8, #ffe8f0);
            border-radius: 25px;
            box-shadow: 
                0 20px 40px rgba(255, 105, 180, 0.3),
                0 15px 25px rgba(255, 182, 193, 0.2);
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            border: 3px solid #ffb3d9;
        }

        .birthday-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 30px 60px rgba(255, 105, 180, 0.4),
                0 20px 35px rgba(255, 182, 193, 0.3);
        }

        .header-section {
            margin-bottom: 25px;
        }

        .age-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            font-size: 3rem;
            font-weight: bold;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: bounce 2s infinite;
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.3);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-15px);
            }
            60% {
                transform: translateY(-7px);
            }
        }

        .main-title {
            font-size: 2.2rem;
            color: #d63384;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.5);
        }

        .subtitle {
            font-size: 1.3rem;
            color: #e83e8c;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .baby-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ff69b4;
            margin: 15px auto 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            position: relative;
            animation: photo-glow 3s ease-in-out infinite;
        }

        .baby-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .baby-photo:hover img {
            transform: scale(1.1);
        }

        @keyframes photo-glow {
            0%, 100% {
                box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            }
            50% {
                box-shadow: 0 15px 35px rgba(255, 105, 180, 0.6);
            }
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffb3d9, #ffc0cb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #ff1493;
            border-radius: 50%;
        }
            font-size: 2.5rem;
            color: #ff1493;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.3);
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .invitation-details {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 2px dashed #ffb3d9;
            box-shadow: inset 0 2px 10px rgba(255, 182, 193, 0.2);
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            font-size: 1.1rem;
            color: #d63384;
            font-weight: bold;
        }

        .detail-icon {
            font-size: 1.5rem;
            margin-right: 10px;
            animation: wiggle 3s infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .rsvp-section {
            background: linear-gradient(45deg, #ffb3d9, #ffc0cb);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            color: #8b0058;
            font-weight: bold;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            font-size: 2rem;
            animation: float 4s ease-in-out infinite;
        }

        .balloon:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            color: #ff69b4;
        }

        .balloon:nth-child(2) {
            top: 15%;
            right: 15%;
            animation-delay: 1s;
            color: #ff1493;
        }

        .balloon:nth-child(3) {
            bottom: 20%;
            left: 15%;
            animation-delay: 2s;
            color: #da70d6;
        }

        .balloon:nth-child(4) {
            bottom: 25%;
            right: 10%;
            animation-delay: 3s;
            color: #ff69b4;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff69b4;
            border-radius: 50%;
            animation: confetti-fall 3s infinite linear;
        }

        .confetti:nth-child(5) {
            left: 20%;
            animation-delay: 0s;
            background: #ff1493;
        }

        .confetti:nth-child(6) {
            left: 40%;
            animation-delay: 0.5s;
            background: #da70d6;
        }

        .confetti:nth-child(7) {
            left: 60%;
            animation-delay: 1s;
            background: #ff69b4;
        }

        .confetti:nth-child(8) {
            left: 80%;
            animation-delay: 1.5s;
            background: #ffc0cb;
        }

        @keyframes confetti-fall {
            0% {
                top: -10px;
                opacity: 1;
            }
            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .bottom-message {
            margin-top: 20px;
            font-size: 1rem;
            color: #e83e8c;
            font-style: italic;
            font-weight: bold;
        }

        .sparkle-heart {
            display: inline-block;
            color: #ff1493;
            animation: heartbeat 1.5s ease-in-out infinite both;
            margin: 0 5px;
        }

        @keyframes heartbeat {
            from {
                transform: scale(1);
            }
            14% {
                transform: scale(1.3);
            }
            28% {
                transform: scale(1);
            }
            42% {
                transform: scale(1.3);
            }
            70% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <div class="birthday-card">
            <div class="floating-elements">
                <div class="balloon">🎈</div>
                <div class="balloon">🎈</div>
                <div class="balloon">🎈</div>
                <div class="balloon">🎈</div>
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
            </div>

            <div class="header-section">
                <div class="age-badge">2</div>
                <h1 class="main-title">You're Invited!</h1>
                <p class="subtitle">Join us for a magical celebration</p>
            </div>

            <div class="baby-photo">
                <!-- Replace with actual baby photo -->
                <!-- <img src="baby-photo.jpg" alt="Princess Emma"> -->
                <div class="photo-placeholder">👶</div>
            </div>

            <div class="baby-name">
                Princess Trishika
            </div>
            <div style="font-size: 1.1rem; color: #e83e8c; margin-bottom: 20px;">
                is turning <strong>TWO!</strong> 🎂
            </div>

            <div class="invitation-details">
                <div class="detail-item">
                    <span class="detail-icon">📅</span>
                    <span>Saturday, November 16th, 2025</span>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">🕐</span>
                    <span>2:00 PM - 5:00 PM</span>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">🏠</span>
                    <span>123 Rainbow Lane, Happy Town</span>
                </div>
                
            </div>

            <div class="rsvp-section">
                <div style="font-size: 1.1rem; margin-bottom: 5px;">RSVP by November 16th</div>
                <div style="font-size: 1rem;">Call: (555) 123-4567</div>
                
            </div>

            <div class="bottom-message">
                Let's make her 2nd birthday unforgettable!
                <span class="sparkle-heart">💖</span>
               
            </div>
        </div>
    </div>

    <script>
        // Add interactive elements
        const card = document.querySelector('.birthday-card');
        const balloons = document.querySelectorAll('.balloon');

        // Make balloons interactive
        balloons.forEach(balloon => {
            balloon.addEventListener('click', () => {
                balloon.style.animation = 'float 0.5s ease-in-out';
                setTimeout(() => {
                    balloon.style.animation = 'float 4s ease-in-out infinite';
                }, 500);
            });
        });

        // Add mouse follow effect for age badge
        const ageBadge = document.querySelector('.age-badge');
        
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 30;
            const rotateY = (x - centerX) / 30;
            
            ageBadge.style.transform = `rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
        });

        card.addEventListener('mouseleave', () => {
            ageBadge.style.transform = 'rotateX(0) rotateY(0)';
        });

        // Create more confetti on hover
        card.addEventListener('mouseenter', () => {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createConfetti();
                }, i * 200);
            }
        });

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.backgroundColor = ['#ff69b4', '#ff1493', '#da70d6', '#ffc0cb'][Math.floor(Math.random() * 4)];
            
            document.querySelector('.floating-elements').appendChild(confetti);
            
            setTimeout(() => {
                confetti.remove();
            }, 3000);
        }
    </script>
</body>
</html>
